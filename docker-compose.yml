services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner        # use the production runner stage
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Add production env vars here or reference a .env file:
      # NEXT_PUBLIC_API_URL: https://api.example.com
    restart: always
