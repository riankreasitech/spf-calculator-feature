services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev          # use the dev stage for hot-reload
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      # Add other dev env vars here or use an .env.local file:
      # NEXT_PUBLIC_API_URL: http://localhost:8080
    volumes:
      # Mount the whole project for hot-reload
      - .:/app
      # Keep the container's node_modules; don't override with host's
      - /app/node_modules
      # Persist .next build cache across restarts
      - next_cache:/app/.next
    restart: unless-stopped

volumes:
  next_cache:
